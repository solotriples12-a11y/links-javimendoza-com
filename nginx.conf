server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cache corto con revalidación vía ETag. Tras max-age el navegador pide
    # con If-None-Match y recibe 304 si no ha cambiado nada. Evitamos
    # `immutable` para que cualquier deploy se vea sin vaciar caché.
    location ~* \.(css|js|svg|png|jpg|jpeg|webp|ico)$ {
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
